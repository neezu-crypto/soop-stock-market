<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOOP STOCK - 거래소</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --primary: #38bdf8;
            --up-color: #ef4444; --down-color: #3b82f6;
            --text-main: #f8fafc; --text-sub: #94a3b8;
        }

        body { font-family: 'Pretendard', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .wrapper { width: 100%; max-width: 800px; }

        /* 자산 헤더 */
        .wallet-bar { 
            position: sticky; top: 0; background: #1e293b; padding: 15px 20px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid var(--primary);
        }
        .wallet-info span { color: var(--primary); font-weight: 800; }

        header { padding: 10px 0; border-bottom: 1px solid #1e293b; margin-bottom: 10px; }
        #search-input {
            width: 100%; padding: 14px; border-radius: 12px; background: var(--card-bg);
            border: 1px solid #334155; color: white; margin-top: 10px;
        }

        /* 주식 카드 레이아웃 수정 */
        #stock-list { display: grid; gap: 12px; }
        .stock-card {
            background: var(--card-bg); padding: 20px; border-radius: 16px;
            display: grid; grid-template-columns: 1.5fr 1fr 1fr 1.2fr; 
            align-items: center; gap: 10px; border: 1px solid #334155;
        }

        .chart-container { width: 80px; height: 35px; }
        .sparkline { stroke-width: 2.5; fill: none; }

        /* 거래 버튼 */
        .trade-btns { display: flex; gap: 5px; }
        .btn { border: none; padding: 8px 12px; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: 13px; }
        .btn-buy { background: var(--up-color); color: white; }
        .btn-sell { background: var(--down-color); color: white; }
        .btn:active { transform: scale(0.95); }

        .my-qty { font-size: 11px; color: var(--text-sub); margin-top: 4px; }

        .up { color: var(--up-color); stroke: var(--up-color); }
        .down { color: var(--down-color); stroke: var(--down-color); }

        /* 소개 및 로딩 오버레이 */
    #intro-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: var(--bg-color); display: flex; justify-content: center; align-items: center;
        z-index: 999; transition: opacity 0.5s ease;
    }
    .intro-content {
        text-align: center; max-width: 400px; padding: 40px;
        background: var(--card-bg); border-radius: 24px; border: 1px solid var(--primary);
        box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
    }
    .intro-logo { font-size: 40px; margin-bottom: 20px; }
    .intro-title { font-size: 24px; font-weight: 800; color: var(--primary); margin-bottom: 10px; }
    .intro-desc { color: var(--text-sub); line-height: 1.6; margin-bottom: 25px; }
    
    /* 로딩 애니메이션 */
    .loader {
        width: 30px; height: 30px; border: 3px solid #334155;
        border-top-color: var(--primary); border-radius: 50%;
        animation: spin 1s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .hidden { opacity: 0; pointer-events: none; }

    .ranking-bar {
    background: var(--card-bg); width: 100%; max-width: 800px;
    padding: 12px 20px; border-radius: 12px; margin-bottom: 20px;
    display: flex; align-items: center; border: 1px dashed #334155;
    overflow: hidden;
}
.ranking-title { font-weight: 800; color: var(--primary); margin-right: 15px; white-space: nowrap; font-size: 14px; }
.ranking-list { display: flex; gap: 20px; font-size: 13px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
.rank-item { display: flex; gap: 6px; }
.rank-num { color: var(--primary); font-weight: 800; }
.rank-name { color: var(--text-main); }
.rank-vol { color: var(--text-sub); font-size: 11px; }
    </style>
</head>
<body>
<div id="intro-overlay">
    <div class="intro-content">
        <div class="intro-logo">📈</div>
        <div class="intro-title">SOOP STOCK</div>
        <div class="intro-desc">
            숲 주식 시장에 오신 것을 환영합니다!<br>
            선호하는 스트리머의 가치를 투자하고<br>
            수익을 창출해보세요.
        </div>
        <div id="login-status">
            <div class="loader"></div>
            <p style="font-size: 13px; color: var(--primary); margin-top: 15px;">익명 보안 로그인 중...</p>
        </div>
    </div>
</div>

<div class="wrapper">
    <div class="wallet-bar">
        <div class="wallet-info">내 잔고: <span id="my-cash">0</span>원</div>
        <div style="font-size: 12px; color: var(--text-sub);">초기 자산 1,000,000원 지급됨</div>
    </div>

    <header>
        <h1 style="font-size: 20px; margin:0;">📈 SOOP 거래소</h1>
        <input type="text" id="search-input" placeholder="스트리머 검색...">
    </header>

    <div class="ranking-bar">
    <div class="ranking-title">🔥 인기 TOP 5</div>
    <div id="top-rankers" class="ranking-list">
        불러오는 중...
    </div>
</div>

    <main id="stock-list"></main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction, get, set } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    
// [캡슐화 시작] 이 함수 안의 변수들은 외부에서 접근할 수 없습니다.
    (function() {
const firebaseConfig = {
    apiKey: "AIzaSyDifzxfQaJ7SWQZF1And87xvkT80LmQQk8",
    authDomain: "soop-stock-market.firebaseapp.com",
    databaseURL: "https://soop-stock-market-default-rtdb.firebaseio.com/",
    projectId: "soop-stock-market",
    appId: "1:997788925900:web:cb613d438efec019a3a769"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

// --- 상태 관리 ---
let myData = null; // 초기값을 null로 설정하여 로딩 상태 구분
let userUID = null;
let allStocks = [];
let isTrading = false; // [추가] 중복 거래 방지 플래그

// --- 캡슐화 내부 상단 상태 관리 섹션에 추가 ---
let allUsers = {}; 

// --- 유저 전체 데이터 리스너 (랭킹 산출용) ---
onValue(ref(db, 'users/'), (snap) => {
    allUsers = snap.val() || {};
    renderRanking(); // 유저 데이터가 바뀔 때마다 랭킹 갱신
});

        
// 랭킹 집계 함수
function renderRanking() {
    const rankDiv = document.getElementById('top-rankers');
    if (!rankDiv || !allStocks.length || !allUsers) return;

    // 1. 모든 유저의 주식 보유량 합산 계산
    const stockOwnership = {}; // { 종목ID: 총보유량 }

    Object.values(allUsers).forEach(user => {
        if (user && user.stocks) {
            Object.entries(user.stocks).forEach(([stockId, data]) => {
                if (data.qty > 0) {
                    stockOwnership[stockId] = (stockOwnership[stockId] || 0) + data.qty;
                }
            });
        }
    });

    // 2. 보유량 기준으로 주식 데이터 매핑 및 정렬
    const sorted = allStocks.map(s => ({
        ...s,
        totalQty: stockOwnership[s.id] || 0
    }))
    .filter(s => s.totalQty > 0)
    .sort((a, b) => b.totalQty - a.totalQty)
    .slice(0, 5);

    if (sorted.length === 0) {
        rankDiv.innerHTML = "보유 중인 주식이 아직 없습니다.";
        return;
    }

    // 3. UI 렌더링
    rankDiv.innerHTML = sorted.map((s, i) => `
        <div class="rank-item">
            <span class="rank-num">${i + 1}</span>
            <span class="rank-name">${s.name}</span>
            <span class="rank-vol">총 ${s.totalQty.toLocaleString()}주 보유</span>
        </div>
    `).join('');
}

function updateUI() {
    const cashDisplay = document.getElementById('my-cash');
    const overlay = document.getElementById('intro-overlay');
    const statusText = document.querySelector('#login-status p');
    
    // 데이터 로딩 상태 체크 (디버깅용 콘솔)
    console.log("상태 체크 - 유저:", userUID, "지갑:", !!myData, "주식수:", allStocks.length);

    // 1. 유저는 확인되었는데 지갑이나 주식이 없는 경우 메시지 업데이트
    if (userUID && (!myData || allStocks.length === 0)) {
        if(statusText) statusText.innerText = "데이터 서버 연결 중...";
        return;
    }

    // 2. 모든 데이터 준비 완료 시
    if (myData && allStocks.length > 0) {
        if (cashDisplay) {
            cashDisplay.innerText = Math.floor(myData.cash).toLocaleString();
        }
        
        renderStocks(document.getElementById('search-input')?.value || "");

        renderRanking();

        if (overlay && !overlay.classList.contains('hidden')) {
            setTimeout(() => {
                overlay.classList.add('hidden');
                console.log("로딩 완료: 오버레이 제거");
            }, 500);
        }
    }
}

// [추가] 5초 이상 로딩 시 에러 메시지 표시
setTimeout(() => {
    const overlay = document.getElementById('intro-overlay');
    const statusText = document.querySelector('#login-status p');
    if (overlay && !overlay.classList.contains('hidden')) {
        statusText.innerHTML = `접속이 지연되고 있습니다.<br>
        <button onclick="location.reload()" style="margin-top:10px; background:#38bdf8; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">새로고침</button>`;
    }
}, 5000);

// --- [보안 핵심] 로그인 및 데이터 동기화 ---
onAuthStateChanged(auth, async (user) => {
    if (user) {
        userUID = user.uid;
        const userRef = ref(db, `users/${userUID}`);
        
        // [수정] 서버 데이터를 기다리기 전에 로컬 변수(myData)부터 즉시 초기화하여
        // 아주 빠른 클릭 시 발생할 수 있는 undefined 에러를 방어합니다.
        if (!myData) {
            myData = { cash: 1000000, stocks: {} };
        }

        // 지갑 데이터를 실시간 감시
        onValue(userRef, (snapshot) => {
            if (snapshot.exists()) {
                const serverData = snapshot.val();
                // [보강] 서버 데이터에 stocks 객체가 없는 경우를 대비해 빈 객체({})를 넣어줍니다.
                if (!serverData.stocks) serverData.stocks = {};
                myData = serverData;
            } else {
                // 신규 유저인 경우 서버에 초기 데이터 생성
                set(userRef, { cash: 1000000, stocks: {} });
            }
            updateUI(); // 데이터 로드 완료 후 UI 반영
        });
    } else {
        signInAnonymously(auth);
    }
});

// --- 주가 변동 및 거래 로직 (서버 사이드 보안 적용) ---
window.trade = async function(id, type) {
    // 1. 중복 클릭 방지 및 로그인 체크
    if (isTrading) return; 
    if (!userUID || !myData) return alert("데이터 로딩 중입니다. 잠시 후 다시 시도해주세요.");
    if (!myData.stocks) myData.stocks = {};

    isTrading = true; // [중요] 거래 시작 지점 설정

    const stockRef = ref(db, `stocks/${id}`);
    const userRef = ref(db, `users/${userUID}`);

    const impact = 0.001;   // 0.1% 변동
    const spread = 0.0005;  // 0.05% 스프레드
    const fee = 0.003;      // 0.3% 수수료

    try {
        // 2. 주가 및 거래 검증 트랜잭션
        await runTransaction(stockRef, (currentStock) => {
            if (!currentStock) return currentStock;
            
            const currentPrice = currentStock.price;
            let newPrice = currentPrice;

            if (type === 'buy') {
                const buyPrice = Math.round(currentPrice * (1 + spread));
                
                // 잔액 검증
                if (myData.cash < buyPrice) {
                    throw new Error("잔액부족"); 
                }
                
                const userStock = myData.stocks[id] || { qty: 0, avg: 0 };
                const totalCost = (userStock.qty * userStock.avg) + buyPrice;
                userStock.qty += 1;
                userStock.avg = Math.round(totalCost / userStock.qty);
                
                myData.cash -= buyPrice;
                myData.stocks[id] = userStock;
                newPrice = Math.round(currentPrice * (1 + impact));
            } else {
                const userStock = myData.stocks[id] || { qty: 0, avg: 0 };
                
                // 보유 수량 검증
                if (userStock.qty < 1) { 
                    throw new Error("보유부족"); 
                }
                
                const sellPrice = Math.round(currentPrice * (1 - spread));
                const finalAmount = Math.round(sellPrice * (1 - fee));
                
                myData.cash += finalAmount;
                userStock.qty -= 1;
                if (userStock.qty === 0) userStock.avg = 0;
                
                myData.stocks[id] = userStock;
                newPrice = Math.round(currentPrice * (1 - impact));
            }

            // 히스토리 업데이트
            let history = currentStock.history || [currentPrice];
            history.push(newPrice);
            if (history.length > 20) history.shift();
            
            const updatedStock = {
                ...currentStock,
                price: newPrice,
                history: history,
                volume: (currentStock.volume || 0) + 1, // 거래당 1씩 누적
                change: (((newPrice - history[0]) / history[0]) * 100).toFixed(2)
            };
            
            delete updatedStock.admin_mode;
            return updatedStock;
        });

        // 3. 서버에 지갑 데이터 업데이트
        await set(userRef, myData);

    } catch (error) {
        console.error("거래 에러:", error);
        // 에러 메시지에 따른 분기 처리
        if (error.message === "잔액부족") alert("잔액이 부족합니다!");
        else if (error.message === "보유부족") alert("보유 주식이 없습니다!");
        else alert("거래 중 오류가 발생했습니다. (주가 급변 등)");
    } finally {
        // 4. 어떤 상황에서도 거래 플래그 해제
        isTrading = false; 
    }
};

// --- 렌더링 로직 ---
function createSparkline(history, isUp) {
    if (!history || history.length < 2) return '';
    const min = Math.min(...history);
    const max = Math.max(...history);
    const range = max - min || 1;
    const pts = history.map((v, i) => `${(i/19)*80},${35 - ((v - min) / range * 35)}`).join(' ');
    return `<svg class="chart-container"><polyline class="sparkline ${isUp?'up':'down'}" points="${pts}" /></svg>`;
}

function renderStocks(filter = "") {
    const listDiv = document.getElementById('stock-list');
    // myData가 없으면 에러가 날 수 있으므로 체크 추가
    if (!listDiv || !myData) return;

    // 데이터가 비어있을 경우를 대비해 기본값(0, 빈 문자열 등) 처리 추가
    const filtered = allStocks.filter(s => s.name && s.name.includes(filter))
                              .sort((a,b) => (b.price || 0) - (a.price || 0))
                              .slice(0, 100);
    listDiv.innerHTML = "";

    filtered.forEach((s) => {
        const id = s.id; 
        const isUp = (s.change || 0) >= 0;
        
        // [핵심 수정] myData.stocks가 정의되지 않았을 경우 빈 객체{}를 사용하도록 방어
        const userStocks = myData.stocks || {}; 
        const userStock = userStocks[id] || { qty: 0, avg: 0 };
        
        let myProfit = 0;
        let profitClass = 'steady';
        if (userStock.qty > 0 && userStock.avg > 0) {
            myProfit = (((s.price - userStock.avg) / userStock.avg) * 100).toFixed(1);
            profitClass = myProfit > 0 ? 'up' : (myProfit < 0 ? 'down' : 'steady');
        }

        const card = document.createElement('div');
        card.className = 'stock-card';
        card.innerHTML = `
            <div class="info-group">
                <div class="stock-name">${s.name || '불러오는 중...'}</div>
                <div class="my-qty">보유: ${userStock.qty}주 <span class="${profitClass}">(${userStock.qty > 0 ? myProfit + '%' : '-'})</span></div>
            </div>
            <div>${createSparkline(s.history || [s.price, s.price], isUp)}</div>
            <div class="price-group">
                <div class="current-price ${isUp?'up':'down'}">${(s.price || 0).toLocaleString()}원</div>
                <div class="price-change ${isUp?'up':'down'}">${isUp?'+':''}${s.change || 0}%</div>
            </div>
            <div class="trade-btns">
                <button class="btn btn-buy" onclick="trade('${id}', 'buy')">매수</button>
                <button class="btn btn-sell" onclick="trade('${id}', 'sell')">매도</button>
            </div>
        `;
        listDiv.appendChild(card);
    });
}
    
// 주식 목록 실시간 리스너
onValue(ref(db, 'stocks/'), (snap) => {
    const data = snap.val() || {};
    allStocks = Object.keys(data).map(key => ({ ...data[key], id: key }));
    updateUI();
});

// 2. [추가 필수] 전체 유저 보유량 변동 감시 (랭킹 전용)
// 누군가 매수/매도하여 users 데이터가 바뀌면 랭킹을 즉시 다시 그립니다.
onValue(ref(db, 'users/'), (snap) => {
    allUsers = snap.val() || {}; // 전역 변수 allUsers 업데이트
    console.log("유저 보유량 데이터 변경 감지 -> 랭킹 갱신");
    renderRanking(); 
});
        
        // 검색창 이벤트 리스너 (캡슐화 끝 부분에 추가)
document.getElementById('search-input')?.addEventListener('input', (e) => {
    renderStocks(e.target.value);
});
        })(); // [캡슐화 끝]
</script>
</body>
</html>
