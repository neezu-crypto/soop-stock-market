<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOOP STOCK - 거래소</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --primary: #38bdf8;
            --up-color: #ef4444; --down-color: #3b82f6;
            --text-main: #f8fafc; --text-sub: #94a3b8;
        }

        body { font-family: 'Pretendard', sans-serif; background: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .wrapper { width: 100%; max-width: 800px; }

        /* 자산 헤더 */
        .wallet-bar { 
            position: sticky; top: 0; background: #1e293b; padding: 15px 20px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid var(--primary);
        }
        .wallet-info span { color: var(--primary); font-weight: 800; }

        header { padding: 10px 0; border-bottom: 1px solid #1e293b; margin-bottom: 10px; }
        #search-input {
            width: 100%; padding: 14px; border-radius: 12px; background: var(--card-bg);
            border: 1px solid #334155; color: white; margin-top: 10px;
        }

        /* 주식 카드 레이아웃 수정 */
        #stock-list { display: grid; gap: 12px; }
        .stock-card {
            background: var(--card-bg); padding: 20px; border-radius: 16px;
            display: grid; grid-template-columns: 1.5fr 1fr 1fr 1.2fr; 
            align-items: center; gap: 10px; border: 1px solid #334155;
        }

        .chart-container { width: 80px; height: 35px; }
        .sparkline { stroke-width: 2.5; fill: none; }

        /* 거래 버튼 컨테이너 레이아웃 수정 */
.trade-btns { 
    display: flex; 
    gap: 4px; 
    align-items: center; 
    justify-content: flex-end;
}

/* 수량 버튼 전용 스타일 (매수/매도 버튼보다 약간 작게) */
.btn-buy-multi { background: #991b1b; color: white; padding: 6px 8px; font-size: 11px; } /* 진한 빨강 */
.btn-sell-multi { background: #1e3a8a; color: white; padding: 6px 8px; font-size: 11px; } /* 진한 파랑 */

/* 기존 버튼 패딩 살짝 조절 (공간 확보) */
.btn { 
    border: none; 
    border-radius: 6px; 
    font-weight: 700; 
    cursor: pointer; 
    transition: all 0.2s;
    white-space: nowrap;
}

.btn-buy { 
    background: #ef4444; /* 메인 레드 */
    color: white; 
    padding: 8px 12px; 
}
.btn-sell { 
    background: #3b82f6; /* 메인 블루 */
    color: white; 
    padding: 8px 12px; 
}

/* 모바일 대응: 버튼이 너무 많으면 수량 버튼 숨기기 혹은 크기 조절 */
@media (max-width: 600px) {
    .stock-card { grid-template-columns: 1fr 1fr; } /* 모바일에서 2줄 레이아웃 권장 */
    .trade-btns { grid-column: span 2; justify-content: center; margin-top: 10px; }
}
        
        /* [추가] 쿨타임 중일 때 버튼 스타일 */
    .btn:disabled, .btn.disabled { 
    background: #444 !important; /* 어두운 색으로 변경 */
    opacity: 0.5; 
    cursor: not-allowed; 
    transform: none !important; 
}

        .my-qty { font-size: 11px; color: var(--text-sub); margin-top: 4px; }

        .up { color: var(--up-color); stroke: var(--up-color); }
        .down { color: var(--down-color); stroke: var(--down-color); }

        /* 소개 및 로딩 오버레이 */
    #intro-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: var(--bg-color); display: flex; justify-content: center; align-items: center;
        z-index: 999; transition: opacity 0.5s ease;
    }
    .intro-content {
        text-align: center; max-width: 400px; padding: 40px;
        background: var(--card-bg); border-radius: 24px; border: 1px solid var(--primary);
        box-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
    }
    .intro-logo { font-size: 40px; margin-bottom: 20px; }
    .intro-title { font-size: 24px; font-weight: 800; color: var(--primary); margin-bottom: 10px; }
    .intro-desc { color: var(--text-sub); line-height: 1.6; margin-bottom: 25px; }
    
    /* 로딩 애니메이션 */
    .loader {
        width: 30px; height: 30px; border: 3px solid #334155;
        border-top-color: var(--primary); border-radius: 50%;
        animation: spin 1s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .hidden { opacity: 0; pointer-events: none; }

    .ranking-bar {
    background: var(--card-bg); width: 100%; max-width: 800px;
    padding: 12px 20px; border-radius: 12px; margin-bottom: 20px;
    display: flex; align-items: center; border: 1px dashed #334155;
    overflow: hidden;
}
.ranking-title { font-weight: 800; color: var(--primary); margin-right: 15px; white-space: nowrap; font-size: 14px; }
.ranking-list { display: flex; gap: 20px; font-size: 13px; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }
.rank-item { display: flex; gap: 6px; }
.rank-num { color: var(--primary); font-weight: 800; }
.rank-name { color: var(--text-main); }
.rank-vol { color: var(--text-sub); font-size: 11px; }

        /* 우측 배너 영역 */
.banner-container {
    position: fixed;
    right: 80px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 20px;
    z-index: 1000;
}

.banner-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    cursor: pointer;
    transition: transform 0.2s;
}

.banner-item:hover {
    transform: scale(1.1);
}

.banner-circle {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: var(--card-bg);
    border: 2px solid var(--primary);
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    text-align: center;
    padding: 5px;
}

.banner-circle img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.banner-no-img {
    font-size: 10px;
    color: var(--text-sub);
    line-height: 1.2;
}

.banner-name {
    margin-top: 8px;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-main);
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

/* 모바일 환경에서는 배너 숨기기 (선택 사항) */
@media (max-width: 1000px) {
    .banner-container { display: none; }
}

/* 좌측 보유 주식 창 */
.my-stocks-container {
    position: fixed;
    left: 80px;
    top: 50%;
    transform: translateY(-50%);
    width: 220px;
    background: var(--card-bg);
    border-radius: 20px;
    border: 1px solid var(--primary);
    padding: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    z-index: 1000;
    max-height: 70vh;
    display: flex;
    flex-direction: column;
}

.my-stocks-title {
    font-size: 16px;
    font-weight: 800;
    color: var(--primary);
    margin-bottom: 15px;
    border-bottom: 1px solid #334155;
    padding-bottom: 10px;
    display: flex;
    justify-content: space-between;
}

.my-stocks-list {
    overflow-y: auto;
    flex: 1;
}

/* 스크롤바 디자인 */
.my-stocks-list::-webkit-scrollbar { width: 4px; }
.my-stocks-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

.my-stock-item {
    margin-bottom: 12px;
    padding: 8px;
    border-radius: 8px;
    background: rgba(255,255,255,0.03);
}

.my-stock-info {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    margin-bottom: 4px;
}

.my-stock-name { font-weight: 700; color: var(--text-main); }
.my-stock-profit { font-weight: 700; font-size: 12px; }

.my-stock-details {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-sub);
}

.no-stock-msg {
    text-align: center;
    color: var(--text-sub);
    font-size: 12px;
    padding: 20px 0;
}

/* 모바일 및 작은 화면에서 숨기기 */
@media (max-width: 1300px) {
    .my-stocks-container { display: none; }
}
    </style>
</head>
<body>
<div id="intro-overlay">
    <div class="intro-content">
        <div class="intro-logo">📈</div>
        <div class="intro-title">스트리머 주식시장</div>
        <div class="intro-desc">
            숲 주식 시장에 오신 것을 환영합니다!<br>
            선호하는 스트리머의 가치를 투자하고<br>
            수익을 창출해보세요.
        </div>
        <div id="login-status">
            <div class="loader"></div>
            <p style="font-size: 13px; color: var(--primary); margin-top: 15px;">익명 보안 로그인 중...</p>
        </div>
    </div>
</div>

<div class="my-stocks-container">
    <div class="my-stocks-title">
        <span>내 보유 주식</span>
        <span id="total-assets" style="font-size: 14px; color: var(--text-sub); align-self: flex-end;">평가중...</span>
    </div>
    <div id="my-stocks-list" class="my-stocks-list">
        <div class="no-stock-msg">보유 중인 주식이 없습니다.</div>
    </div>
</div>

<div class="wrapper">
    <div class="wallet-bar">
        <div class="wallet-info">내 잔고: <span id="my-cash">0</span>원</div>
        <div style="font-size: 12px; color: var(--text-sub);">초기 자산 1,000,000원 지급됨</div>
    </div>

    <header>
        <h1 style="font-size: 20px; margin:0;">📈 스트리머 주식시장(상위 Top100)</h1>
        <p style="font-size: 13px; color: var(--text-sub); margin: 5px 0 0 0;">
            찾고 있는 스트리머가 있다면 아래 검색창에서 이름을 검색해보세요.
        </p>
        <input type="text" id="search-input" placeholder="스트리머 검색...">
    </header>

    <div class="ranking-bar">
        <div class="ranking-title">🔥 인기 TOP 5</div>
        <div id="top-rankers" class="ranking-list">불러오는 중...</div>
    </div>

    <main id="stock-list"></main>

    <div class="banner-container" id="banner-list">
        <a href="https://note.sooplive.co.kr/app/index.php?page=write&targetUserId=skftodwocks2" target="_blank" class="banner-item">
            <div class="banner-circle">
                <div class="banner-no-img">방송국 홍보 가능<br></div>
            </div>
            <div class="banner-name">문의하기</div>
        </a>
    </div>
</div>

    <main id="stock-list"></main>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction, get, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    
// [캡슐화 시작] 이 함수 안의 변수들은 외부에서 접근할 수 없습니다.
    (function() {
const firebaseConfig = {
    apiKey: "AIzaSyDifzxfQaJ7SWQZF1And87xvkT80LmQQk8",
    authDomain: "soop-stock-market.firebaseapp.com",
    databaseURL: "https://soop-stock-market-default-rtdb.firebaseio.com/",
    projectId: "soop-stock-market",
    appId: "1:997788925900:web:cb613d438efec019a3a769"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

// --- 상태 관리 ---
let myData = null; // 초기값을 null로 설정하여 로딩 상태 구분
let userUID = null;
let allStocks = [];
let isTrading = false; // [추가] 중복 거래 방지 플래그
        
// 오디오 객체 사전 로드 (함수 외부 또는 상단에 배치)
const buySound = new Audio("https://github.com/neezu-crypto/Splayground/raw/refs/heads/main/buy%20sound.mp3");
const sellSound = new Audio("https://github.com/neezu-crypto/Splayground/raw/refs/heads/main/sell%20sound.mp3");

// [추가] 볼륨 조절 (0.5는 50% 볼륨입니다)
buySound.volume = 0.1;
sellSound.volume = 0.1;

// --- 캡슐화 내부 상단 상태 관리 섹션에 추가 ---
let allUsers = {}; 

// --- 유저 전체 데이터 리스너 (랭킹 산출용) ---
onValue(ref(db, 'users/'), (snap) => {
    const data = snap.val();
    if (data) {
        allUsers = data;
        console.log("전체 유저 데이터 로드 완료:", Object.keys(allUsers).length, "명");
        
        // 내 데이터(myData)를 기다리지 않고, 
        // 주식 정보(allStocks)만 있다면 바로 랭킹을 그립니다.
        if (allStocks && allStocks.length > 0) {
            renderRanking();
        }
    } else {
        allUsers = {};
    }
    
    // 내 보유량 UI 업데이트 시도
    updateUI(); 
}, (error) => {
    console.error("유저 데이터 동기화 에러:", error);
});

        
// 랭킹 집계 함수
function renderRanking() {
    const rankDiv = document.getElementById('top-rankers');
    // 데이터 로드 확인
    if (!rankDiv || !allStocks || allStocks.length === 0) return;

    // 1. 모든 유저의 주식 보유량 합산 계산
    const stockOwnership = {}; 

    // [중요] 현재 로그인한 나의 최신 데이터를 먼저 반영 (네트워크 지연 대비)
    if (userUID && myData && myData.stocks) {
        Object.entries(myData.stocks).forEach(([stockId, data]) => {
            const qty = parseInt(data.qty) || 0;
            if (qty > 0) stockOwnership[stockId] = qty;
        });
    }

    // 2. 다른 모든 유저의 데이터 합산 (나 제외)
    if (allUsers) {
        Object.keys(allUsers).forEach(uid => {
            if (uid === userUID) return; // 내 데이터는 위에서 이미 처리함
            const user = allUsers[uid];
            if (user && user.stocks) {
                Object.entries(user.stocks).forEach(([stockId, data]) => {
                    const qty = parseInt(data.qty) || 0;
                    if (qty > 0) {
                        stockOwnership[stockId] = (stockOwnership[stockId] || 0) + qty;
                    }
                });
            }
        });
    }

    // 3. 보유량 기준으로 주식 데이터 매핑 및 정렬
    const sorted = allStocks
        .map(s => ({
            ...s,
            totalQty: stockOwnership[s.id] || 0
        }))
        .filter(s => s.totalQty > 0)
        .sort((a, b) => b.totalQty - a.totalQty) // 내림차순 정렬
        .slice(0, 5);

    // 4. UI 렌더링
    if (sorted.length === 0) {
        rankDiv.innerHTML = `<span style="color:var(--text-sub); font-size:12px;">보유 데이터 없음</span>`;
        return;
    }

    rankDiv.innerHTML = sorted.map((s, i) => `
        <div class="rank-item">
            <span class="rank-num">${i + 1}</span>
            <span class="rank-name">${s.name}</span>
            <span class="rank-vol">총 ${s.totalQty.toLocaleString()}주</span>
        </div>
    `).join('');
}

// 내 보유주식 표시
function renderMyPortfolio() {
    const portfolioDiv = document.getElementById('my-stocks-list');
    const totalAssetsDisplay = document.getElementById('total-assets'); // 평가총액 엘리먼트
    
    if (!portfolioDiv || !myData || !myData.stocks) return;

    const userStocks = myData.stocks;
    const stockIds = Object.keys(userStocks).filter(id => userStocks[id].qty > 0);
    
    // [추가] 평가 총액 초기화 변수
    let totalStockValue = 0;

    if (stockIds.length === 0) {
        portfolioDiv.innerHTML = '<div class="no-stock-msg">보유 중인 주식이 없습니다.</div>';
        if (totalAssetsDisplay) totalAssetsDisplay.innerText = "0원";
        return;
    }

    portfolioDiv.innerHTML = "";
    
    stockIds.forEach(id => {
        const stockData = allStocks.find(s => s.id === id);
        if (!stockData) return;

        const info = userStocks[id];
        const currentPrice = stockData.price || 0;
        
        // [추가] 각 종목의 (현재가 * 보유수량)을 총액에 더함
        totalStockValue += (currentPrice * info.qty);

        const profit = (((currentPrice - info.avg) / info.avg) * 100).toFixed(1);
        const profitClass = profit > 0 ? 'up' : (profit < 0 ? 'down' : 'steady');

        const item = document.createElement('div');
        item.className = 'my-stock-item';
        item.innerHTML = `
            <div class="my-stock-info">
                <span class="my-stock-name">${stockData.name}</span>
                <span class="my-stock-profit ${profitClass}">${profit > 0 ? '+' : ''}${profit}%</span>
            </div>
            <div class="my-stock-details">
                <span>${info.qty}주 보유</span>
                <span>평균 ${info.avg.toLocaleString()}원</span>
            </div>
        `;
        portfolioDiv.appendChild(item);
    });

    // [추가] 계산된 평가 총액을 좌측 상단 UI에 반영
    if (totalAssetsDisplay) {
        totalAssetsDisplay.innerText = `총 ${totalStockValue.toLocaleString()}원`;
    }
}
function updateUI() {
    const cashDisplay = document.getElementById('my-cash');
    const overlay = document.getElementById('intro-overlay');
    const statusText = document.querySelector('#login-status p');
    
    // 랭킹은 다른 유저 데이터(allUsers)만 있어도 그릴 수 있으므로 우선 실행
    if (allStocks.length > 0) {
        renderRanking();
    }

    // 데이터 로딩 상태 체크
    if (userUID && (!myData || allStocks.length === 0)) {
        if(statusText) statusText.innerText = "데이터 서버 연결 중...";
        return;
    }

    // 내 지갑 정보가 로드되었을 때만 실행되는 구역
    if (myData && allStocks.length > 0) {
        if (cashDisplay) {
            cashDisplay.innerText = Math.floor(myData.cash).toLocaleString();
        }
        
        renderStocks(document.getElementById('search-input')?.value || "");

        // 모든 데이터 준비 완료 시 오버레이 제거
        if (overlay && !overlay.classList.contains('hidden')) {
            setTimeout(() => {
                overlay.classList.add('hidden');
                console.log("로딩 완료: 오버레이 제거");
            }, 500);
        }
    }
    renderMyPortfolio();
}

// [추가] 5초 이상 로딩 시 에러 메시지 표시
setTimeout(() => {
    const overlay = document.getElementById('intro-overlay');
    const statusText = document.querySelector('#login-status p');
    if (overlay && !overlay.classList.contains('hidden')) {
        statusText.innerHTML = `접속이 지연되고 있습니다.<br>
        <button onclick="location.reload()" style="margin-top:10px; background:#38bdf8; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">새로고침</button>`;
    }
}, 5000);

// --- [보안 핵심] 로그인 및 데이터 동기화 ---
onAuthStateChanged(auth, async (user) => {
    if (user) {
        userUID = user.uid;
        const userRef = ref(db, `users/${userUID}`);
        
        // [수정] 서버 데이터를 기다리기 전에 로컬 변수(myData)부터 즉시 초기화하여
        // 아주 빠른 클릭 시 발생할 수 있는 undefined 에러를 방어합니다.
        if (!myData) {
            myData = { cash: 1000000, stocks: {} };
        }

        // 지갑 데이터를 실시간 감시
        onValue(userRef, (snapshot) => {
            if (snapshot.exists()) {
                const serverData = snapshot.val();
                // [보강] 서버 데이터에 stocks 객체가 없는 경우를 대비해 빈 객체({})를 넣어줍니다.
                if (!serverData.stocks) serverData.stocks = {};
                myData = serverData;
            } else {
                // 신규 유저인 경우 서버에 초기 데이터 생성
                set(userRef, { cash: 1000000, stocks: {} });
            }
            updateUI(); // 데이터 로드 완료 후 UI 반영
        });
    } else {
        signInAnonymously(auth);
    }
});

// --- 상태 관리 섹션에 추가 ---
let lastTradeTime = 0; // 마지막 거래 시간을 저장 (밀리초)

// --- 주가 변동 및 거래 로직 (서버 사이드 보안 적용) ---
// 수정된 trade 함수: 세 번째 인자로 qty(기본값 1)를 받습니다.
window.trade = async function(id, type, qty = 1) {
    const currentTime = Date.now();
    const cooldownTime = 1000; // 1초 (1000ms)

    // 1. 쿨타임 체크
    if (currentTime - lastTradeTime < cooldownTime) {
        const remaining = Math.ceil((cooldownTime - (currentTime - lastTradeTime)) / 1000);
        alert(`거래가 너무 빠릅니다! ${remaining}초 후에 다시 시도해주세요.`);
        return;
    }
    
    // 2. 중복 클릭 방지 및 로그인 체크
    if (isTrading) return; 
    if (!userUID || !myData) return alert("데이터 로딩 중입니다. 잠시 후 다시 시도해주세요.");
    
    isTrading = true; 
    renderStocks(document.getElementById('search-input')?.value || ""); 

    // 지갑 내 주식 주머니가 없으면 생성
    if (!myData.stocks) myData.stocks = {};

    const stockRef = ref(db, `stocks/${id}`);
    const userRef = ref(db, `users/${userUID}`);

    // 수량에 따른 주가 영향도 계산 (1주당 0.1%씩 변동)
    const impact = 0.001 * qty;   
    const spread = 0.0005;  // 0.05% 스프레드
    const fee = 0.003;      // 0.3% 수수료

    try {
        await runTransaction(stockRef, (currentStock) => {
            if (!currentStock) return currentStock;
            
            const currentPrice = currentStock.price;
            const impact = 0.001 * qty;   // 수량 비례 영향도
            const spread = 0.0005; 
            const fee = 0.003;

            let finalTradePrice; // 실제 내가 거래하게 될 1주당 가격
            let newPrice;        // 거래 후 형성될 새로운 시장가

            if (type === 'buy') {
                // [핵심] 주가를 먼저 올린 후, 그 가격으로 매수합니다.
                newPrice = Math.round(currentPrice * (1 + impact));
                finalTradePrice = Math.round(newPrice * (1 + spread));

                const totalBuyPrice = finalTradePrice * qty;
                if (myData.cash < totalBuyPrice) throw new Error("잔액부족"); 
                
                const userStock = myData.stocks[id] || { qty: 0, avg: 0 };
                const totalCost = (userStock.qty * userStock.avg) + totalBuyPrice;
                userStock.qty += qty;
                userStock.avg = Math.round(totalCost / userStock.qty);
                
                myData.cash -= totalBuyPrice;
                myData.stocks[id] = userStock;
            } else {
                const userStock = myData.stocks[id] || { qty: 0, avg: 0 };
                if (userStock.qty < qty) throw new Error("보유부족"); 

                // [핵심] 주가를 먼저 내린 후, 그 가격으로 매도합니다.
                newPrice = Math.round(currentPrice * (1 - impact));
                finalTradePrice = Math.round(newPrice * (1 - spread));
                
                const totalSellAmount = Math.round((finalTradePrice * qty) * (1 - fee));
                
                myData.cash += totalSellAmount;
                userStock.qty -= qty;
                if (userStock.qty === 0) userStock.avg = 0;
                myData.stocks[id] = userStock;
            }

            // 히스토리 및 데이터 업데이트
            let history = currentStock.history || [currentPrice];
            history.push(newPrice);
            if (history.length > 20) history.shift();
            
            return {
                ...currentStock,
                price: newPrice,
                history: history,
                volume: (currentStock.volume || 0) + qty,
                change: (((newPrice - history[0]) / history[0]) * 100).toFixed(2)
            };
        });

        // 4. 서버에 내 지갑 데이터 업데이트
        await set(userRef, {
            ...myData,
            lastTradeTime: serverTimestamp()
        });

        // 거래 성공 사운드 재생
        if (type === 'buy') {
            buySound.currentTime = 0;
            buySound.play().catch(e => console.log("사운드 재생 실패:", e));
        } else {
            sellSound.currentTime = 0;
            sellSound.play().catch(e => console.log("사운드 재생 실패:", e));
        }

        // 5. 거래 성공 시 마지막 거래 시간 기록
        lastTradeTime = Date.now();

        console.log(`거래 완료 (${qty}주): UI 갱신`);
        renderRanking(); 
        updateUI();

    } catch (error) {
        console.error("거래 에러:", error);
        if (error.message === "잔액부족") alert("잔액이 부족합니다!");
        else if (error.message === "보유부족") alert("보유 주식이 부족합니다!");
        else alert("거래 중 오류가 발생했습니다.");
    } finally {
        // 쿨타임 해제
        setTimeout(() => {
            isTrading = false; 
            renderStocks(document.getElementById('search-input')?.value || "");
        }, cooldownTime);
    }
};

        // 홍보 배너
        function renderBanners() {
    const bannerList = document.getElementById('banner-list');
    if (!bannerList) return;

    // 기본 개발자 배너는 유지하고 시작
    bannerList.innerHTML = `
        <a href="https://note.sooplive.co.kr/app/index.php?page=write&targetUserId=skftodwocks2" target="_blank" class="banner-item">

    // 이미지 링크가 있는 스트리머만 필터링하여 배너 생성

            `;
            bannerList.appendChild(a);
        }
    });
}
        
// --- 렌더링 로직 ---
function createSparkline(history, isUp) {
    if (!history || history.length < 2) return '';
    const min = Math.min(...history);
    const max = Math.max(...history);
    const range = max - min || 1;
    const pts = history.map((v, i) => `${(i/19)*80},${35 - ((v - min) / range * 35)}`).join(' ');
    return `<svg class="chart-container"><polyline class="sparkline ${isUp?'up':'down'}" points="${pts}" /></svg>`;
}

function renderStocks(filter = "") {
    const listDiv = document.getElementById('stock-list');
    // myData가 없으면 에러가 날 수 있으므로 체크 추가
    if (!listDiv || !myData) return;

    // 데이터가 비어있을 경우를 대비해 기본값(0, 빈 문자열 등) 처리 추가
    const filtered = allStocks.filter(s => s.name && s.name.includes(filter))
                              .sort((a,b) => (b.price || 0) - (a.price || 0))
                              .slice(0, 100);
    listDiv.innerHTML = "";

    filtered.forEach((s) => {
        const id = s.id; 
        const isUp = (s.change || 0) >= 0;
        
        // [핵심 수정] myData.stocks가 정의되지 않았을 경우 빈 객체{}를 사용하도록 방어
        const userStocks = myData.stocks || {}; 
        const userStock = userStocks[id] || { qty: 0, avg: 0 };
        
        let myProfit = 0;
        let profitClass = 'steady';
        if (userStock.qty > 0 && userStock.avg > 0) {
            myProfit = (((s.price - userStock.avg) / userStock.avg) * 100).toFixed(1);
            profitClass = myProfit > 0 ? 'up' : (myProfit < 0 ? 'down' : 'steady');
        }

        const card = document.createElement('div');
card.className = 'stock-card';
card.innerHTML = `
    <div class="info-group">
        <div class="stock-name">${s.name || '불러오는 중...'}</div>
        <div class="my-qty">보유: ${userStock.qty}주 <span class="${profitClass}">(${userStock.qty > 0 ? myProfit + '%' : '-'})</span></div>
    </div>
    <div>${createSparkline(s.history || [s.price, s.price], isUp)}</div>
    <div class="price-group">
        <div class="current-price ${isUp ? 'up' : 'down'}">${(s.price || 0).toLocaleString()}원</div>
        <div class="price-change ${isUp ? 'up' : 'down'}">${isUp ? '+' : ''}${s.change || 0}%</div>
    </div>
    <div class="trade-btns">
    <button class="btn btn-buy-multi" onclick="trade('${id}', 'buy', 10)" ${isTrading ? 'disabled' : ''}>+10</button>
    <button class="btn btn-buy" onclick="trade('${id}', 'buy', 1)" ${isTrading ? 'disabled' : ''}>매수</button>
    
    <div style="width: 1px; height: 20px; background: #334155; margin: 0 4px;"></div> <button class="btn btn-sell" onclick="trade('${id}', 'sell', 1)" ${isTrading ? 'disabled' : ''}>매도</button>
    <button class="btn btn-sell-multi" onclick="trade('${id}', 'sell', 10)" ${isTrading ? 'disabled' : ''}>-10</button>
</div>
`;
listDiv.appendChild(card);
    });
}
