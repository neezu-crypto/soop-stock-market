<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SOOP STOCK - 관리자 센터</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        body { font-family: 'Pretendard', sans-serif; background: #0f172a; color: #f8fafc; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; background: #1e293b; padding: 30px; border-radius: 16px; border: 1px solid #334155; margin-bottom: 20px; display: none; }
        .login-box { display: flex; flex-direction: column; align-items: center; gap: 20px; background: #1e293b; padding: 40px; border-radius: 16px; border: 1px solid #334155; }
        h1 { font-size: 20px; color: #38bdf8; margin-bottom: 20px; border-bottom: 2px solid #334155; padding-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .info-box { background: #334155; padding: 12px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; color: #cbd5e1; line-height: 1.5; }
        .batch-control { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
        input[type="number"] { flex: 1; background: #0f172a; border: 1px solid #475569; color: #38bdf8; padding: 12px; border-radius: 8px; outline: none; font-size: 16px; }
        textarea { width: 100%; height: 200px; background: #0f172a; border: 1px solid #475569; color: #38bdf8; padding: 15px; border-radius: 8px; box-sizing: border-box; font-size: 14px; resize: none; margin-top: 10px; }
        button { cursor: pointer; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: #38bdf8; color: #0f172a; width: 100%; margin-top: 15px; font-size: 15px; }
        .btn-success { background: #22c55e; color: white; }
        .btn-google { background: white; color: #334155; display: flex; align-items: center; gap: 10px; font-size: 16px; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        #admin-info { margin-bottom: 20px; font-size: 14px; color: #94a3b8; }
    </style>
</head>
<body>

<div id="login-section" class="login-box">
    <h2 style="margin:0">Admin Auth</h2>
    <p style="color:#94a3b8; font-size:14px">관리자 계정으로 로그인하세요.</p>
    <button class="btn-google" onclick="login()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
        Google로 로그인
    </button>
</div>

<div id="admin-section" style="display:none; width:100%; max-width:600px;">
    <div id="admin-info"></div>

    <div class="container" style="display:block">
    <h1>🔍 개별 종목 관리</h1>
    <div class="info-box">종목 이름을 검색하여 가격을 직접 수정할 수 있습니다.</div>
    <input type="text" id="admin-search" placeholder="스트리머 검색..." style="width:100%; background:#0f172a; border:1px solid #475569; color:white; padding:12px; border-radius:8px; box-sizing:border-box; margin-bottom:15px;">
    
    <div id="admin-stock-list" style="display: flex; flex-direction: column; gap: 10px; max-height: 300px; overflow-y: auto;">
        </div>
</div>

    <div class="container" style="display:block">
        <h1>📈 주가 일괄 조정 (% 단위)</h1>
        <div class="info-box">입력한 수치만큼 전 종목 주가를 변동시킵니다.</div>
        <div class="batch-control">
            <input type="number" id="percent-input" placeholder="예: 10 또는 -5">
            <button class="btn-success" onclick="adjustAllPrices()">일괄 적용</button>
        </div>
    </div>

    <div class="container" style="display:block">
        <h1>🚀 신규 스트리머 상장</h1>
        <div class="info-box">닉네임을 한 줄에 하나씩 입력하세요.</div>
        <textarea id="list" placeholder="닉네임1&#10;닉네임2..."></textarea>
        <button class="btn-primary" onclick="uploadStocks()">일괄 상장 실행</button>
    </div>
    
    <button onclick="logout()" style="background:transparent; color:#ef4444; text-decoration:underline; font-size:12px">로그아웃</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getDatabase, ref, get, update, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDifzxfQaJ7SWQZF1And87xvkT80LmQQk8",
        authDomain: "soop-stock-market.firebaseapp.com",
        databaseURL: "https://soop-stock-market-default-rtdb.firebaseio.com/",
        projectId: "soop-stock-market",
        appId: "1:997788925900:web:cb613d438efec019a3a769"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const ADMIN_EMAIL = "skftodwocks2@gmail.com";

    // --- 개별 주식 검색 및 수정 로직 ---
let allStocksData = {};

    // [수정] 로그인이 되어있든 아니든 데이터는 한 번만 감시하도록 밖으로 뺍니다.
onValue(ref(db, 'stocks/'), (snap) => {
    allStocksData = snap.val() || {};
    // 관리자 세션이 활성화된 상태일 때만 리스트를 갱신합니다.
    const adminSection = document.getElementById('admin-section');
    if (adminSection && adminSection.style.display === 'block') {
        renderAdminStockList();
    }
});

// 주식 데이터 실시간 로드 (검색용)
onAuthStateChanged(auth, (user) => {
    if (user && user.email === ADMIN_EMAIL) {
        onValue(ref(db, 'stocks/'), (snap) => {
            allStocksData = snap.val() || {};
            renderAdminStockList(); // 데이터 변경 시 리스트 갱신
        });
    }
});

// 관리자용 주식 리스트 렌더링
function renderAdminStockList() {
    const searchVal = document.getElementById('admin-search').value.toLowerCase();
    const listDiv = document.getElementById('admin-stock-list');
    if (!listDiv) return;

    listDiv.innerHTML = "";

    Object.entries(allStocksData).forEach(([id, s]) => {
        if (s.name.toLowerCase().includes(searchVal)) {
            const item = document.createElement('div');
            item.className = 'batch-control'; // 기존 스타일 재활용
            item.style.padding = "10px";
            item.style.background = "#0f172a";
            item.style.borderRadius = "8px";
            
            item.innerHTML = `
                <div style="flex:1; font-size:14px;">${s.name}</div>
                <input type="number" id="input-${id}" value="${s.price}" style="width:100px; flex:none;">
                <button class="btn-success" onclick="updateSinglePrice('${id}')" style="padding:8px 12px; font-size:12px;">수정</button>
            `;
            listDiv.appendChild(item);
        }
    });
}

// 개별 가격 수정 실행
window.updateSinglePrice = async function(id) {
    const newPrice = parseInt(document.getElementById(`input-${id}`).value);
    if (isNaN(newPrice)) return alert("정확한 가격을 입력해주세요.");

    const oldStock = allStocksData[id];
    let history = oldStock.history || [oldStock.price];
    history.push(newPrice);
    if (history.length > 20) history.shift();

    const updates = {};
    updates[`stocks/${id}/price`] = newPrice;
    updates[`stocks/${id}/history`] = history;
    updates[`stocks/${id}/change`] = (((newPrice - history[0]) / history[0]) * 100).toFixed(2);

    try {
        await update(ref(db), updates);
        alert(`✅ ${oldStock.name}의 가격이 ${newPrice.toLocaleString()}원으로 수정되었습니다.`);
    } catch (e) {
        alert("수정 실패: 관리자 권한을 확인하세요.");
    }
};

// 검색창 입력 이벤트 연결
document.getElementById('admin-search')?.addEventListener('input', renderAdminStockList);
    
    // --- 인증 로직 ---
    window.login = () => {
        signInWithPopup(auth, provider).catch(err => alert("로그인 실패: " + err.message));
    };

    window.logout = () => {
        signOut(auth);
    };

    onAuthStateChanged(auth, (user) => {
    if (user && user.email === ADMIN_EMAIL) {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('admin-section').style.display = 'block';
        document.getElementById('admin-info').innerText = `접속 계정: ${user.email} (관리자)`;
        renderAdminStockList(); // 로그인 성공 시 목록 초기 렌더링
    } else {
            if (user) alert("관리자 권한이 없습니다.");
            document.getElementById('login-section').style.display = 'flex';
            document.getElementById('admin-section').style.display = 'none';
        }
    });

    // --- 주식 상장 (관리자 전용) ---
    window.uploadStocks = async function() {
        const text = document.getElementById('list').value;
        if (!text.trim()) return alert("상장할 이름을 입력해주세요.");

        const uniqueNames = [...new Set(text.split('\n').map(n => n.trim()))].filter(n => n !== "");
        const stocks = {};

        uniqueNames.forEach((name, i) => {
            stocks[`id_${i}`] = {
                name: name,
                price: 10000,
                change: 0,
                history: [10000, 10000]
            };
        });

        if(confirm(`${uniqueNames.length}명을 상장하시겠습니까?`)) {
            try {
                await set(ref(db, 'stocks/'), stocks);
                alert("🎉 상장이 완료되었습니다!");
                document.getElementById('list').value = "";
            } catch (e) { alert("권한 거부: 관리자 계정이 아닙니다."); }
        }
    }

    // --- 주가 조정 (관리자 전용) ---
    window.adjustAllPrices = async function() {
        const percent = parseFloat(document.getElementById('percent-input').value);
        if (isNaN(percent)) return alert("숫자를 입력해주세요.");

        try {
            const snapshot = await get(ref(db, 'stocks/'));
            const data = snapshot.val();
            if (!data) return;

            const updates = {};
            const multiplier = 1 + (percent / 100);

            Object.keys(data).forEach(id => {
                const oldPrice = data[id].price;
                const newPrice = Math.round(oldPrice * multiplier);
                let history = data[id].history || [oldPrice];
                history.push(newPrice);
                if (history.length > 20) history.shift();

                updates[`stocks/${id}/price`] = newPrice;
                updates[`stocks/${id}/history`] = history;
                updates[`stocks/${id}/change`] = (((newPrice - history[0]) / history[0]) * 100).toFixed(2);
            });

            await update(ref(db), updates);
            alert(`🔥 전 종목 주가가 ${percent}% 조정되었습니다!`);
        } catch (e) { alert("권한 거부 또는 오류 발생"); }
    }
</script>
</body>
</html>
